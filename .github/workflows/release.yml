name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --skip-existing --verbose

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          NOTES=$(git log "${PREV_TAG}..HEAD" --oneline 2>/dev/null || echo "Release ${TAG}")
          gh release create "$TAG" \
            --title "Aegis-Devin ${TAG}" \
            --notes "## Aegis-Devin ${TAG}

AI-driven autonomous penetration testing + network forensics platform.

### Install
\`\`\`bash
pip install aegis-devin
\`\`\`

### Changes
${NOTES}" \
            --latest \
            --verify-tag
